			// 估算单条记录占用的字节数（递归处理嵌套在对象/数组中的二进制数据）
			calculateRecordSize: function (value) {
				try {
					if (value === null || value === undefined) return 0;
					if (typeof value === 'string') return new Blob([value]).size;
					if (typeof value === 'number' || typeof value === 'boolean') return 8;
					if (value instanceof Blob) return value.size;
					if (value instanceof ArrayBuffer) return value.byteLength;
					if (ArrayBuffer.isView(value)) return value.byteLength;
					if (Array.isArray(value)) {
						return value.reduce((sum, item) => sum + this.calculateRecordSize(item), 0);
					}
					if (typeof value === 'object') {
						return Object.keys(value).reduce((sum, key) => {
							return sum + new Blob([key]).size + this.calculateRecordSize(value[key]);
						}, 0);
					}
					return new Blob([JSON.stringify(value)]).size;
				} catch (e) {
					return 0;
				}
			},

			// 识别记录值中的二进制内容（ArrayBuffer / TypedArray / Blob，或含 buffer 字段的对象）
			getRecordBinaryInfo: function (value) {
				try {
					if (!value || typeof value !== 'object') return null;
					if (value instanceof Blob) {
						return { blob: value, mime: value.type || '', size: value.size };
					}
					let buffer = null;
					let mime = '';
					if (value instanceof ArrayBuffer) {
						buffer = value;
					} else if (ArrayBuffer.isView(value)) {
						buffer = value.buffer;
					} else if (value.buffer instanceof ArrayBuffer) {
						buffer = value.buffer;
						mime = typeof value.mime === 'string' ? value.mime : '';
					} else if (ArrayBuffer.isView(value.buffer)) {
						buffer = value.buffer.buffer;
						mime = typeof value.mime === 'string' ? value.mime : '';
					}
					if (!buffer) return null;
					return { blob: new Blob([buffer], { type: mime }), mime, size: buffer.byteLength };
				} catch (e) {
					return null;
				}
			},

			// 释放二进制预览创建的 blob URL
			revokeBinaryPreviews: function () {
				if (this._binaryPreviewUrls && this._binaryPreviewUrls.length) {
					this._binaryPreviewUrls.forEach(u => URL.revokeObjectURL(u));
				}
				this._binaryPreviewUrls = [];
			},

			// 获取IndexedDB详细信息
			getIndexedDBDetails: async function (dbName) {
				return new Promise((resolve, reject) => {
					if (!window.indexedDB || !window.indexedDB.databases) {
						reject(new Error('IndexedDB API不可用'));
						return;
					}

					indexedDB.databases().then(databases => {
						const dbInfo = databases.find(db => db.name === dbName);
						if (!dbInfo) {
							reject(new Error('数据库未找到'));
							return;
						}

						// 尝试打开数据库获取对象存储信息
						const request = indexedDB.open(dbName);
						request.onerror = () => resolve({ ...dbInfo, objectStores: [] });

						request.onsuccess = (event) => {
							const db = event.target.result;
							const objectStores = [];

							if (db.objectStoreNames.length === 0) {
								db.close();
								resolve({ ...dbInfo, objectStores: [], totalSize: 0, totalRecords: 0, date: new Date() });
								return;
							}

							let pendingStores = db.objectStoreNames.length;

							// 收集对象存储信息
							Array.from(db.objectStoreNames).forEach(storeName => {
								const transaction = db.transaction(storeName, 'readonly');
								const objectStore = transaction.objectStore(storeName);
								const indexes = Array.from(objectStore.indexNames);

								// 获取对象存储的数据（最多1000条），同时统计总大小和总记录数
								const data = [];
								let storeTotalBytes = 0;
								let storeTotalRecords = 0;
								const cursorRequest = objectStore.openCursor();
								cursorRequest.onsuccess = (e) => {
									const cursor = e.target.result;
									if (cursor) {
										storeTotalRecords++;
										storeTotalBytes += this.calculateRecordSize(cursor.value);
										if (data.length < 1000) {
											data.push({ id: data.length + 1, key: cursor.key, value: cursor.value });
										}
										cursor.continue();
									}
								};
								cursorRequest.onerror = (e) => {
									// 阻止事务因游标失败而中止，在同一（未失败的）事务上回退到 getAll/getAllKeys
									e.preventDefault();
									e.stopPropagation();
									// 点号 keyPath（如 'a.b'）逐段取值
									const getKeyByPath = (value) => {
										if (!objectStore.keyPath) return undefined;
										return String(objectStore.keyPath).split('.').reduce((obj, seg) => {
											return (obj !== null && typeof obj === 'object') ? obj[seg] : undefined;
										}, value);
									};
									const keysRequest = objectStore.getAllKeys();
									const dataRequest = objectStore.getAll();
									let allKeys = [];
									keysRequest.onsuccess = (ke) => {
										allKeys = ke.target.result || [];
									};
									dataRequest.onsuccess = (de) => {
										const result = de.target.result || [];
										storeTotalRecords = result.length;
										storeTotalBytes = result.reduce((sum, value) => sum + this.calculateRecordSize(value), 0);
										result.slice(0, 200).forEach((value, index) => {
											let key;
											if (objectStore.keyPath && value !== null && typeof value === 'object') {
												// 内联键：从 value 中按 keyPath 提取
												key = getKeyByPath(value);
											} else {
												// out-of-line 键（含 value 为原始类型的情况）：取真实键
												key = allKeys[index];
											}
											data.push({ id: index + 1, key: key, value });
										});
									};
								};

								transaction.onerror = () => {
									db.close();
									reject(transaction.error || new Error(`读取对象存储 ${storeName} 失败`));
								};
								transaction.onabort = () => {
									db.close();
									reject(transaction.error || new Error(`读取对象存储 ${storeName} 被中止`));
								};

								transaction.oncomplete = () => {
									objectStores.push({
										name: storeName,
										indexes: indexes,
										data: data,
										keyPath: objectStore.keyPath,
										autoIncrement: objectStore.autoIncrement,
										size: storeTotalBytes,
										records: storeTotalRecords
									});
									pendingStores--;
									if (pendingStores === 0) {
										db.close();
										resolve({
											...dbInfo,
											objectStores: objectStores,
											totalSize: objectStores.reduce((sum, s) => sum + (s.size || 0), 0),
											totalRecords: objectStores.reduce((sum, s) => sum + (s.records || 0), 0),
											date: new Date()
										});
									}
								};
							});
						};
					}).catch(reject);
				});
			},

			// 获取缓存详细信息
			getCacheDetails: async function (cacheName) {
				try {
					if (!('caches' in window)) {
						throw new Error('CacheStorage API不可用');
					}

					const cache = await caches.open(cacheName);
					const requests = await cache.keys();
					const resources = requests.map(req => req.url);
					const size = await this.calculateCacheSize(cache, requests);

					return {
						name: cacheName,
						items: requests.length,
						resources: resources,
						size: size,
						date: new Date()
					};
				} catch (error) {
					console.error('获取缓存详情失败:', error);
					return {
						name: cacheName,
						items: 0,
						resources: [],
						size: 0,
						date: new Date()
					};
				}
			},

			// 计算缓存大小
			calculateCacheSize: async function (cache, requests) {
				try {
					let totalSize = 0;

					for (const request of requests) {
						const response = await cache.match(request);
						if (response) {
							const blob = await response.blob();
							totalSize += blob.size;
						}
					}

					return totalSize;
				} catch (error) {
					console.error('计算缓存大小失败:', error);
					return 0;
				}
			},



			// 保存当前项
			saveCurrentItem: async function () {
				if (!this.currentSelection) return;

				try {
					if (this.currentSelection.type === 'localStorage') {
						await this.saveLocalStorage();
					} else if (this.currentSelection.type === 'indexedDB') {
						await this.saveIndexedDB();
					} else {
						alert('当前类型不支持保存');
						return;
					}
					this.clearDirty();
					this.loadStorageItems(this.currentStorageType);
					this.updateStorageSpaceInfo(this.currentStorageType);
					alert('保存成功');
				} catch (error) {
					console.error('保存失败:', error);
					alert(`保存失败: ${error.message}`);
				}
			},

			// 保存 localStorage
			saveLocalStorage: function () {
				const newKey = document.getElementById('localKeyInput').value.trim();
				const newValue = document.getElementById('localValueInput').value;

				if (!newKey) {
					throw new Error('键名不能为空');
				}

				const originalKey = this.currentSelection.originalKey;
				if (originalKey && originalKey !== newKey) {
					localStorage.removeItem(originalKey);
				}
				localStorage.setItem(newKey, newValue);

				this.currentSelection.key = newKey;
				this.currentSelection.originalKey = newKey;
				this.currentSelection.isNew = false;
				document.getElementById('storageItemTitle').textContent = newKey;
			},

			// 解析 JSON 值，失败则返回原字符串
			parseJsonValue: function (value) {
				if (value === undefined || value === null || value === '') return '';
				const trimmed = value.trim();
				if (trimmed === '') return '';
				try {
					return JSON.parse(trimmed);
				} catch (e) {
					return value;
				}
			},

			// 保存 IndexedDB
			saveIndexedDB: async function () {
				const dbNameInput = document.getElementById('dbNameInput');
				const dbName = dbNameInput ? dbNameInput.value.trim() : this.currentSelection.key;
				const isNew = this.currentSelection.isNew;

				if (!dbName) {
					throw new Error('数据库名称不能为空');
				}
				const dbInfo = this.currentSelection.dbInfo || { version: 1, objectStores: [] };

				// 收集 DOM 中的对象存储状态
				const allSections = document.querySelectorAll('.object-store-section');
				const stores = [];
				const deletedStores = [];

				for (const section of allSections) {
					const isDeleted = section.dataset.deleted === 'true';
					const originalStoreName = section.dataset.originalName || '';
					const isNewStore = section.dataset.isNew === 'true';
					const nameInput = section.querySelector('[data-field="store-name"]');
					const newStoreName = nameInput ? nameInput.value.trim() : '';
					const originalNameInput = section.querySelector('[data-field="store-original-name"]');
					const displayOriginalName = originalNameInput ? originalNameInput.value.trim() : originalStoreName;
					const keyPathInput = section.querySelector('[data-field="store-key-path"]');
					const keyPath = keyPathInput ? keyPathInput.value.trim() : '';
					const autoIncrementInput = section.querySelector('[data-field="store-auto-increment"]');
					const autoIncrement = autoIncrementInput ? autoIncrementInput.value === 'true' : false;
					const indexesInput = section.querySelector('[data-field="store-indexes"]');
					const indexes = indexesInput ? indexesInput.value.split(',').map(s => s.trim()).filter(Boolean) : [];

					if (isDeleted) {
						if (!isNewStore && originalStoreName) {
							deletedStores.push(originalStoreName);
						}
						continue;
					}

					if (!newStoreName) {
						throw new Error('对象存储名称不能为空');
					}

					// 对比原始对象存储元数据，判断是否需要重建或修改索引
					const originalStore = originalStoreName ? (dbInfo.objectStores || []).find(s => s.name === originalStoreName) : null;

					const records = [];
					const rows = section.querySelectorAll('.records-table tr[data-record-index]:not([data-deleted="true"])');
					for (const row of rows) {
						const keyInput = row.querySelector('[data-field="record-key"]');
						const valueInput = row.querySelector('[data-field="record-value"]');
						const isNewRecord = row.dataset.isNew === 'true';
						const isBinary = row.dataset.binary === 'true';

						// 原始键直接引用内存中保存的键对象，不做 JSON 往返，
						// 避免 Date/数组/ArrayBuffer 键在序列化后变质
						let originalKeyRef;
						if (!isNewRecord && originalStore && originalStore.data) {
							const recordIndex = parseInt(row.dataset.recordIndex, 10);
							if (Number.isInteger(recordIndex) && originalStore.data[recordIndex]) {
								originalKeyRef = originalStore.data[recordIndex].key;
							}
						}

						let recordKey;
						if (keyInput) {
							recordKey = this.parseJsonValue(keyInput.value);
						} else {
							recordKey = originalKeyRef;
						}

						let recordValue;
						if (isBinary) {
							// 二进制记录不可文本编辑，保存时回填原始值，防止被 JSON 化损坏
							recordValue = undefined;
						} else if (valueInput) {
							recordValue = this.parseJsonValue(valueInput.value);
						}

						records.push({
							originalKey: originalKeyRef,
							key: recordKey,
							value: recordValue,
							isNew: isNewRecord,
							binaryIndex: isBinary ? parseInt(row.dataset.recordIndex, 10) : undefined
						});
					}

					// 回填二进制记录的原始值
					if (originalStore && originalStore.data) {
						records.forEach(rec => {
							if (rec.binaryIndex !== undefined && originalStore.data[rec.binaryIndex]) {
								rec.value = originalStore.data[rec.binaryIndex].value;
							}
						});
					}
					// 找不到原始值的二进制记录视为放弃，避免写入空值损坏数据
					for (let i = records.length - 1; i >= 0; i--) {
						if (records[i].binaryIndex !== undefined && records[i].value === undefined) {
							records.splice(i, 1);
						}
					}
					let wasRecreated = false;
					let indexChanged = false;
					if (originalStore) {
						const origKeyPath = originalStore.keyPath || '';
						const origAutoIncrement = !!originalStore.autoIncrement;
						const origIndexes = originalStore.indexes || [];
						if (origKeyPath !== keyPath || origAutoIncrement !== autoIncrement) {
							wasRecreated = true;
						}
						if (origIndexes.length !== indexes.length || !origIndexes.every(idx => indexes.includes(idx))) {
							indexChanged = true;
						}
					}

					// 重命名或重建都需要先删除旧对象存储
					if (!isNewStore && originalStoreName && (originalStoreName !== newStoreName || wasRecreated)) {
						if (!deletedStores.includes(originalStoreName)) {
							deletedStores.push(originalStoreName);
						}
					}

					stores.push({
						originalName: originalStoreName,
						displayOriginalName: displayOriginalName,
						newName: newStoreName,
						isNew: isNewStore,
						wasRecreated: wasRecreated,
						indexChanged: indexChanged,
						keyPath: keyPath,
						autoIncrement: autoIncrement,
						indexes: indexes,
						records: records
					});
				}

				// 校验对象存储名称唯一性
				const storeNames = stores.map(s => s.newName);
				const duplicates = storeNames.filter((name, index) => storeNames.indexOf(name) !== index);
				if (duplicates.length > 0) {
					throw new Error(`对象存储名称重复: ${duplicates.join(', ')}`);
				}

				// 新建数据库时检查名称是否已存在
				if (isNew && window.indexedDB && window.indexedDB.databases) {
					const existing = await indexedDB.databases();
					if (existing.some(db => db.name === dbName)) {
						throw new Error(`数据库 "${dbName}" 已存在，请更换名称`);
					}
				}

				const hasStructuralChanges = isNew || deletedStores.length > 0 || stores.some(s =>
					s.isNew || s.wasRecreated || s.indexChanged || s.originalName !== s.newName
				);

				if (hasStructuralChanges) {
					// 结构变更会删除旧对象存储并按内存记录重写，而内存中仅加载了前 200 条。
					// 先在旧存储被删除前读取其全部记录并与编辑结果合并，避免未加载的记录丢失。
					for (const store of stores) {
						const willRewrite = !store.isNew && store.originalName &&
							(store.wasRecreated || store.originalName !== store.newName);
						if (!isNew && willRewrite) {
							await this.mergeFullStoreRecords(dbName, store, dbInfo);
						}
					}
					await this.applyIndexedDBStructuralChanges(dbName, isNew ? 0 : dbInfo.version, deletedStores, stores, dbInfo);
				}

				await this.applyIndexedDBRecordChanges(dbName, stores, dbInfo);

				// 更新当前选择状态并刷新右侧详情
				this.currentSelection.key = dbName;
				this.currentSelection.originalName = dbName;
				this.currentSelection.isNew = false;
				this.currentSelection.dbInfo = await this.getIndexedDBDetails(dbName);
				document.getElementById('storageItemTitle').textContent = dbName;
				this.renderIndexedDBEditor(dbName, this.currentSelection.dbInfo, false);
			},

			// 应用 IndexedDB 结构变更
			applyIndexedDBStructuralChanges: function (dbName, currentVersion, deletedStores, stores, dbInfo) {
				return new Promise((resolve, reject) => {
					const newVersion = currentVersion > 0 ? currentVersion + 1 : 1;
					const request = indexedDB.open(dbName, newVersion);

					request.onerror = () => reject(new Error(`打开数据库 ${dbName} 失败`));
					request.onblocked = () => reject(new Error(`数据库 ${dbName} 被阻塞，请关闭其他标签页`));

					request.onupgradeneeded = (event) => {
						const db = event.target.result;

						// 删除对象存储（包含显式删除、重命名、重建）
						deletedStores.forEach(storeName => {
							if (db.objectStoreNames.contains(storeName)) {
								db.deleteObjectStore(storeName);
							}
						});

						// 创建/重建对象存储
						stores.forEach(store => {
							if (store.isNew || store.wasRecreated || (store.originalName && store.originalName !== store.newName)) {
								if (db.objectStoreNames.contains(store.newName)) {
									db.deleteObjectStore(store.newName);
								}
								const options = {};
								if (store.keyPath) options.keyPath = store.keyPath;
								if (store.autoIncrement) options.autoIncrement = true;
								const objectStore = db.createObjectStore(store.newName, options);
								// 创建索引
								(store.indexes || []).forEach(indexName => {
									if (!objectStore.indexNames.contains(indexName)) {
										objectStore.createIndex(indexName, indexName);
									}
								});
							} else if (store.indexChanged && dbInfo) {
								// 仅索引变化：在原对象存储上增删索引
								if (db.objectStoreNames.contains(store.newName)) {
									const objectStore = event.target.transaction.objectStore(store.newName);
									const originalStore = (dbInfo.objectStores || []).find(s => s.name === store.originalName);
									const origIndexes = originalStore ? (originalStore.indexes || []) : [];
									const newIndexes = store.indexes || [];
									origIndexes.forEach(idx => {
										if (!newIndexes.includes(idx) && objectStore.indexNames.contains(idx)) {
											objectStore.deleteIndex(idx);
										}
									});
									newIndexes.forEach(idx => {
										if (!objectStore.indexNames.contains(idx)) {
											objectStore.createIndex(idx, idx);
										}
									});
								}
							}
						});
					};

					request.onsuccess = (event) => {
						const db = event.target.result;
						db.close();
						resolve();
					};
				});
			},

			// 比较两个 IndexedDB 键是否相等（支持数组/Date/二进制键；类型不可比较时视为不相等）
			idbKeysEqual: function (a, b) {
				if (a === b) return true;
				if (a === undefined || b === undefined) return false;
				try {
					return indexedDB.cmp(a, b) === 0;
				} catch (e) {
					return false;
				}
			},

			// 校验一个值是否为合法的 IndexedDB 键
			isValidIdbKey: function (key) {
				if (typeof key === 'number') return !Number.isNaN(key);
				if (typeof key === 'string') return true;
				if (key instanceof Date) return !Number.isNaN(key.getTime());
				if (key instanceof ArrayBuffer || ArrayBuffer.isView(key)) return true;
				if (Array.isArray(key)) return key.length > 0 && key.every(item => this.isValidIdbKey(item));
				return false;
			},

			// 读取对象存储的全部记录（不受编辑器 200 条加载上限影响）
			readAllStoreRecords: function (dbName, storeName) {
				return new Promise((resolve, reject) => {
					const request = indexedDB.open(dbName);
					request.onerror = () => reject(new Error(`打开数据库 ${dbName} 失败`));
					request.onblocked = () => reject(new Error(`数据库 ${dbName} 被阻塞，请关闭其他标签页`));
					request.onsuccess = (event) => {
						const db = event.target.result;
						if (!db.objectStoreNames.contains(storeName)) {
							db.close();
							reject(new Error(`对象存储 ${storeName} 不存在`));
							return;
						}
						const transaction = db.transaction(storeName, 'readonly');
						const objectStore = transaction.objectStore(storeName);
						let allKeys = [];
						let allValues = [];
						const keysRequest = objectStore.getAllKeys();
						const valuesRequest = objectStore.getAll();
						keysRequest.onsuccess = (e) => { allKeys = e.target.result || []; };
						valuesRequest.onsuccess = (e) => { allValues = e.target.result || []; };
						transaction.oncomplete = () => {
							db.close();
							resolve(allValues.map((value, index) => ({ key: allKeys[index], value: value })));
						};
						transaction.onerror = () => {
							db.close();
							reject(transaction.error || new Error(`读取对象存储 ${storeName} 失败`));
						};
						transaction.onabort = () => {
							db.close();
							reject(transaction.error || new Error(`读取对象存储 ${storeName} 被中止`));
						};
					};
				});
			},

			// 结构变更重写前，用原存储的全量记录与编辑器中的改动合并：
			// 未加载进编辑器（超出 200 条上限）的记录原样保留，
			// 已加载但被删除的记录丢弃，编辑过/新增的记录以编辑器内容为准。
			mergeFullStoreRecords: async function (dbName, store, dbInfo) {
				const originalStore = (dbInfo.objectStores || []).find(s => s.name === store.originalName);
				if (!originalStore) return;
				// 未发生截断（已加载全部记录）时，编辑器中的记录即为全量，无需合并
				if (originalStore.data && typeof originalStore.records === 'number' &&
					originalStore.data.length >= originalStore.records) return;
				const fullRecords = await this.readAllStoreRecords(dbName, store.originalName);
				const loadedKeys = (originalStore.data || []).map(r => r.key);
				const editedRecords = store.records.filter(r => !r.isNew && r.originalKey !== undefined);
				const newRecords = store.records.filter(r => r.isNew);
				const merged = [];
				fullRecords.forEach(fullRecord => {
					const edited = editedRecords.find(r => this.idbKeysEqual(r.originalKey, fullRecord.key));
					if (edited) {
						merged.push(edited);
						return;
					}
					const wasLoaded = loadedKeys.some(k => this.idbKeysEqual(k, fullRecord.key));
					if (!wasLoaded) {
						// 超出加载上限、未出现在编辑器中的记录：原样保留
						merged.push({ originalKey: fullRecord.key, key: fullRecord.key, value: fullRecord.value, isNew: false });
					}
					// 已加载但不在编辑器记录中的，视为用户已删除，不再保留
				});
				store.records = merged.concat(newRecords);
			},

			// 为单个对象存储生成写操作计划（纯内存计算与校验，不触碰数据库）。
			// 任何校验失败都会在此抛出异常，保证失败时不产生任何写操作。
			buildIndexedDBWritePlan: function (store, dbInfo) {
				const keyPath = store.keyPath || null;
				const autoIncrement = !!store.autoIncrement;

				// 新对象存储、重命名、重建后，原有记录已随旧存储删除，
				// 因此把当前所有记录都当作新记录写入
				const forceAsNew = store.isNew || store.wasRecreated || (store.originalName && store.originalName !== store.newName);

				// 点号 keyPath（如 'a.b'）逐段取值
				const extractKey = (value) => {
					if (value === null || typeof value !== 'object') return undefined;
					return String(keyPath).split('.').reduce((obj, seg) => {
						return (obj !== null && typeof obj === 'object') ? obj[seg] : undefined;
					}, value);
				};

				// 计算实际使用的 key
				const getRecordKey = (record) => {
					if (keyPath) {
						return extractKey(record.value);
					}
					return record.key;
				};

				// 第一阶段：逐条校验并算出目标键
				const entries = store.records.map(record => {
					const isNewRecord = record.isNew || forceAsNew;

					// 校验：带 keyPath 且自增时，value 必须是对象
					if (keyPath && autoIncrement && (record.value === null || typeof record.value !== 'object')) {
						throw new Error('自增且含 Key Path 的对象存储，记录值必须对象，即必须含有 Key Path 所对应的键值对');
					}

					const effectiveKey = getRecordKey(record);

					if (!keyPath && !autoIncrement && (effectiveKey === undefined || effectiveKey === '')) {
						throw new Error('记录键不能为空');
					}
					if (keyPath && !autoIncrement && effectiveKey === undefined) {
						throw new Error(`记录值缺少 Key Path "${keyPath}" 对应的字段`);
					}
					if (effectiveKey !== undefined && effectiveKey !== '' && !this.isValidIdbKey(effectiveKey)) {
						throw new Error(`记录键无效（键必须是数字、字符串、日期、二进制数据或数组）: ${JSON.stringify(effectiveKey)}`);
					}

					return { record, isNewRecord, effectiveKey };
				});

				// 校验：新增或被修改的键不得与其他记录的目标键冲突
				entries.forEach((entry, index) => {
					if (entry.effectiveKey === undefined || entry.effectiveKey === '') return;
					const keyIntroduced = entry.record.isNew ||
						(entry.record.originalKey !== undefined && !this.idbKeysEqual(entry.record.originalKey, entry.effectiveKey));
					if (!keyIntroduced) return;
					const duplicated = entries.some((other, otherIndex) => {
						return otherIndex !== index && other.effectiveKey !== undefined && other.effectiveKey !== '' &&
							this.idbKeysEqual(other.effectiveKey, entry.effectiveKey);
					});
					if (duplicated) {
						throw new Error(`记录键重复: ${JSON.stringify(entry.effectiveKey)}`);
					}
				});

				// 第二阶段：构造写操作序列
				const ops = [];

				if (!forceAsNew && dbInfo) {
					// 删除已不存在的旧记录（按键对象比较，而非引用比较）
					const originalStore = (dbInfo.objectStores || []).find(s => s.name === (store.originalName || store.newName));
					if (originalStore && originalStore.data) {
						originalStore.data.forEach(origRecord => {
							const survives = store.records.some(record => {
								return !record.isNew && record.originalKey !== undefined &&
									this.idbKeysEqual(record.originalKey, origRecord.key);
							});
							if (!survives) {
								ops.push({ type: 'delete', key: origRecord.key });
							}
						});
					}
				}

				entries.forEach(({ record, isNewRecord, effectiveKey }) => {
					const keyChanged = record.originalKey !== undefined && !this.idbKeysEqual(record.originalKey, effectiveKey);

					if (keyPath) {
						// key 包含在 value 中，不能显式传 key
						if (isNewRecord) {
							ops.push({ type: 'add', value: record.value });
						} else {
							// 如果 key 发生变化，先删除旧记录
							if (keyChanged) {
								ops.push({ type: 'delete', key: record.originalKey });
							}
							ops.push({ type: 'put', value: record.value });
						}
					} else if (autoIncrement) {
						// 自增时，key 可选
						if (isNewRecord) {
							if (effectiveKey === undefined || effectiveKey === '') {
								ops.push({ type: 'add', value: record.value });
							} else {
								ops.push({ type: 'add', value: record.value, key: effectiveKey });
							}
						} else {
							if (keyChanged) {
								ops.push({ type: 'delete', key: record.originalKey });
								ops.push({ type: 'add', value: record.value, key: effectiveKey });
							} else {
								ops.push({ type: 'put', value: record.value, key: effectiveKey });
							}
						}
					} else {
						// 无 keyPath 且非自增，必须提供 key（已在第一阶段校验）
						if (isNewRecord) {
							ops.push({ type: 'add', value: record.value, key: effectiveKey });
						} else {
							if (keyChanged) {
								ops.push({ type: 'delete', key: record.originalKey });
								ops.push({ type: 'add', value: record.value, key: effectiveKey });
							} else {
								ops.push({ type: 'put', value: record.value, key: effectiveKey });
							}
						}
					}
				});

				return ops;
			},

			// 应用 IndexedDB 记录变更
			applyIndexedDBRecordChanges: function (dbName, stores, dbInfo) {
				return new Promise((resolve, reject) => {
					const request = indexedDB.open(dbName);
					request.onerror = () => reject(new Error(`打开数据库 ${dbName} 失败`));
					request.onblocked = () => reject(new Error(`数据库 ${dbName} 被阻塞，请关闭其他标签页`));

					request.onsuccess = (event) => {
						const db = event.target.result;

						// 第一阶段：在内存中为所有对象存储生成写计划并完成全部校验，
						// 任何一个校验失败都不开启写事务，确保不会产生任何写操作
						let plans;
						try {
							plans = stores
								.filter(store => db.objectStoreNames.contains(store.newName))
								.map(store => ({ store: store, ops: this.buildIndexedDBWritePlan(store, dbInfo) }));
						} catch (e) {
							db.close();
							reject(e);
							return;
						}

						// 第二阶段：校验全部通过后，才逐存储开启读写事务并执行写计划
						const storePromises = plans.map(plan => {
							return new Promise((res, rej) => {
								const transaction = db.transaction(plan.store.newName, 'readwrite');
								transaction.onerror = (e) => rej(e.target.error);
								transaction.onabort = () => rej(transaction.error || new Error('事务已中止，可能存在重复键或其他约束错误'));
								transaction.oncomplete = () => res();

								const objectStore = transaction.objectStore(plan.store.newName);

								try {
									plan.ops.forEach(op => {
										if (op.type === 'delete') {
											objectStore.delete(op.key);
										} else if (op.type === 'add') {
											if (op.key === undefined) {
												objectStore.add(op.value);
											} else {
												objectStore.add(op.value, op.key);
											}
										} else if (op.type === 'put') {
											if (op.key === undefined) {
												objectStore.put(op.value);
											} else {
												objectStore.put(op.value, op.key);
											}
										}
									});
								} catch (e) {
									// 执行期异常：中止事务回滚全部写入，避免只写了一半
									try { transaction.abort(); } catch (e2) { }
									rej(e);
								}
							});
						});

						Promise.all(storePromises).then(() => {
							db.close();
							resolve();
						}).catch(err => {
							db.close();
							reject(err);
						});
					};
				});
			},

			// 确认删除
			confirmDelete: async function (storageType, key) {
				var alertText = "确定删除 " + key + " 吗？\n\n注意：不建议在这里删除任何数据，可能会引发很多未知问题。";
				if (storageType == 'localStorage') alertText = alertText + "\n删除该存储项后，可能导致部分网站功能异常，本地数据丢失。";
				if (storageType == 'indexedDB') alertText = alertText + "\n删除该存储项后，可能导致需要大容量储存的网站出现异常，本地数据丢失。";
				if (storageType == 'cacheStorage') alertText = alertText + "\n删除该缓存后，其中缓存的全部资源将被一并删除。";
				if (await confirm(alertText)) {
					await this.doDeleteStorageItem(storageType, key);
				}
			},

			// 删除存储项
			doDeleteStorageItem: async function (storageType, key) {

				try {
						switch (storageType) {
							case 'localStorage':
								localStorage.removeItem(key);
								break;

							case 'indexedDB':
								// 打开选定的数据库并清空所有对象存储，等待清空真正完成后再继续
								await new Promise((resolve) => {
									const openRequest = indexedDB.open(key);
									openRequest.onsuccess = (event) => {
										const db = event.target.result;
										// 获取所有对象存储名称
										const storeNames = Array.from(db.objectStoreNames);
										if (storeNames.length === 0) {
											db.close();
											resolve();
											return;
										}
										let completed = 0;
										const done = () => {
											completed++;
											if (completed === storeNames.length) {
												db.close(); // 操作完成后关闭数据库
												resolve();
											}
										};

										// 遍历每个对象存储并清空数据
										storeNames.forEach(storeName => {
											const transaction = db.transaction(storeName, 'readwrite');
											const objectStore = transaction.objectStore(storeName);
											const clearRequest = objectStore.clear();

											clearRequest.onsuccess = () => {
												console.log(`对象存储 ${storeName} 数据已清空`);
											};
											clearRequest.onerror = (e) => {
												console.error(`清空 ${storeName} 失败:`, e.target.error);
											};
											transaction.oncomplete = done;
											transaction.onerror = done;
											transaction.onabort = done;
										});
									};
									openRequest.onerror = (e) => {
										console.error(`打开数据库 ${key} 失败:`, e.target.error);
										resolve();
									};
								});
								break;

							case 'cacheStorage':
								// 仅删除缓存本身及其资源，不影响 Service Worker 注册
								if ('caches' in window) {
									await caches.delete(key);
								}
								break;
						}

						// 重新加载存储项
						this.loadStorageItems(this.currentStorageType);

						// 刷新用量摘要
						this.updateStorageSpaceInfo(this.currentStorageType);

						// 清除编辑器
						await this.clearSelection();
					} catch (error) {
						console.error('删除失败:', error);
						alert(`删除失败: ${error.message}`);
					}
				refreshLeftItems();
			},

			// 清除全部存储
			clearAllStorage: async function () {
				if (!this.currentStorageType) {
					alert("请打开任一存储选项卡后再进行操作。");
					return 0;
				}
				var alertText = "确定清除所有 " + this.currentStorageType + " 存储吗？\n\n注意：不建议在这里删除任何数据，可能会引发很多未知问题。";
				if (this.currentStorageType == 'localStorage') alertText = alertText + "\n删除 LocalStorage 后，可能导致部分网站功能异常，本地数据丢失。";
				if (this.currentStorageType == 'indexedDB') alertText = alertText + "\n删除 IndexedDB 后，可能导致需要大容量储存的网站出现异常，本地数据丢失。";
				if (this.currentStorageType == 'cacheStorage') alertText = alertText + "\n删除 CacheStorage 后，可能导致部分网站的本地缓存丢失。";
				if (await confirm(alertText)) {
					switch (this.currentStorageType) {
						case 'localStorage':
							localStorage.clear();
							break;

						case 'indexedDB':
							if (window.indexedDB && window.indexedDB.databases) {
								try {
									const databases = await indexedDB.databases();
									// 等待所有数据库清空真正完成后再继续
									await Promise.all(databases.map(dbInfo => new Promise((resolve) => {
										// 打开数据库
										const request = indexedDB.open(dbInfo.name, dbInfo.version);
										request.onsuccess = (event) => {
											const db = event.target.result;
											const storeNames = Array.from(db.objectStoreNames);
											if (storeNames.length === 0) {
												db.close();
												resolve();
												return;
											}
											let completed = 0;
											const done = () => {
												completed++;
												if (completed === storeNames.length) {
													db.close(); // 操作完成后关闭数据库
													resolve();
												}
											};
											// 遍历所有对象存储
											storeNames.forEach(storeName => {
												// 读写
												const transaction = db.transaction(storeName, 'readwrite');
												const objectStore = transaction.objectStore(storeName);
												// 清空当前对象存储的所有数据
												const clearRequest = objectStore.clear();

												clearRequest.onsuccess = () => {
													console.log(`对象存储 ${storeName} 数据已清空`);
												};
												clearRequest.onerror = (e) => {
													console.error(`清空 ${storeName} 失败:`, e.target.error);
												};
												transaction.oncomplete = done;
												transaction.onerror = done;
												transaction.onabort = done;
											});
										};
										request.onerror = (e) => {
											console.error(`打开数据库 ${dbInfo.name} 失败:`, e.target.error);
											resolve();
										};
									})));
								} catch (error) {
									console.error('获取数据库列表失败:', error);
								}
							} else {
								console.error('浏览器不支持IndexedDB枚举');
							}
							console.log('已删除所有IndexedDB数据，但结构保留');
							alert(`已删除所有 IndexedDB 数据，但结构保留`);
							break;

						case 'cacheStorage':
							await caches.keys().then(cacheNames => {
								return Promise.all(
									cacheNames.map(cacheName => caches.delete(cacheName))
								);
							});
							console.log('已删除所有缓存');
							alert(`已删除所有缓存`);
							break;
					}

					// 重新加载存储项
					this.loadStorageItems(this.currentStorageType);

					// 刷新用量摘要
					this.updateStorageSpaceInfo(this.currentStorageType);

					// 清除编辑器
					await this.clearSelection();
				}
				refreshLeftItems();
			},

			// 更新存储空间信息
			updateStorageSpaceInfo: async function (storageType) {
				let usedSpace = 0;
				let totalSpace = 0;
				let usedEstimated = false;
				let totalEstimated = false;
				let usedTitle = '';
				let totalTitle = '';

				try {
					switch (storageType) {
						case 'localStorage':
							// 已用空间（按 UTF-16 码元计量，与浏览器口径一致）
							for (let i = 0; i < localStorage.length; i++) {
								const key = localStorage.key(i);
								const value = localStorage.getItem(key);
								usedSpace += this.localStorageEntrySize(key, value);
							}
							// 总容量无 API 可读，按保守的 5MB 估算
							totalSpace = 5 * 1024 * 1024;
							totalEstimated = true;
							usedTitle = 'localStorage 已用（按键和值的 UTF-16 长度计算）';
							totalTitle = 'localStorage 配额无 API 可读，浏览器通常为 5-10MB，此为保守估算';
							break;

						case 'indexedDB': {
							const indexedDBInfo = await this.calculateIndexedDBSpace();
							usedSpace = indexedDBInfo.used;
							totalSpace = indexedDBInfo.total;
							usedEstimated = indexedDBInfo.usedEstimated;
							totalEstimated = indexedDBInfo.totalEstimated;
							usedTitle = usedEstimated ? 'IndexedDB 已用（估算）' : 'IndexedDB 已用（精确）';
							totalTitle = totalEstimated ? '整个源的配额未知，此为估算值' : '整个源的配额（所有存储类型共享）';
							break;
						}

						case 'cacheStorage': {
							const cacheInfo = await this.calculateCacheStorageSpace();
							usedSpace = cacheInfo.used;
							totalSpace = cacheInfo.total;
							usedEstimated = cacheInfo.usedEstimated;
							totalEstimated = cacheInfo.totalEstimated;
							usedTitle = usedEstimated ? 'CacheStorage 已用（估算）' : 'CacheStorage 已用（精确）';
							totalTitle = totalEstimated ? '整个源的配额未知，此为估算值' : '整个源的配额（所有存储类型共享）';
							break;
						}
					}
				} catch (error) {
					console.error("计算存储空间失败:", error);
					usedSpace = 0;
					totalSpace = 0;
				}

				// 更新UI（估算值加"约"前缀，并在 title 中说明口径）
				const usedSpaceEl = document.getElementById('usedSpace');
				const totalSpaceEl = document.getElementById('totalSpace');
				usedSpaceEl.textContent = (usedEstimated ? '约 ' : '') + this.formatBytes(usedSpace);
				totalSpaceEl.textContent = (totalEstimated ? '约 ' : '') + this.formatBytes(totalSpace);
				usedSpaceEl.title = usedTitle;
				totalSpaceEl.title = totalTitle;

				// 更新进度条
				const percentage = totalSpace > 0 ? Math.min(100, Math.round((usedSpace / totalSpace) * 100)) : 0;
				document.getElementById('usageProgress').style.width = `${percentage}%`;
			},


			// localStorage 单项大小：浏览器按 UTF-16 码元计量（每码元 2 字节），value 为 null 时按 '' 处理
			localStorageEntrySize: function (key, value) {
				return ((key ? key.length : 0) + (value ? value.length : 0)) * 2;
			},

			// 计算单个 IndexedDB 数据库的统计信息（记录数 + 字节大小，游标流式累计）
			getDatabaseStats: function (dbName) {
				return new Promise((resolve) => {
					const request = indexedDB.open(dbName);
					request.onsuccess = (event) => {
						const db = event.target.result;
						if (db.objectStoreNames.length === 0) {
							db.close();
							resolve({ count: 0, size: 0 });
							return;
						}
						let count = 0;
						let size = 0;
						let completed = 0;

						Array.from(db.objectStoreNames).forEach(storeName => {
							const transaction = db.transaction(storeName, 'readonly');
							const store = transaction.objectStore(storeName);

							// 记录数
							const countRequest = store.count();
							countRequest.onsuccess = (e) => {
								count += e.target.result;
							};

							// 字节大小（通过游标累计，避免大量数据入内存）
							const cursorRequest = store.openCursor();
							cursorRequest.onsuccess = (e) => {
								const cursor = e.target.result;
								if (cursor) {
									size += this.calculateRecordSize(cursor.value);
									cursor.continue();
								}
							};

							transaction.oncomplete = () => {
								completed++;
								if (completed === db.objectStoreNames.length) {
									db.close();
									resolve({ count, size });
								}
							};
							transaction.onerror = () => {
								completed++;
								if (completed === db.objectStoreNames.length) {
									db.close();
									resolve({ count, size });
								}
							};
						});
					};
					request.onerror = () => resolve({ count: 0, size: 0 });
				});
			},

			// 计算IndexedDB空间
			// 已用大小：优先取 estimate().usageDetails.indexedDB（精确）；
			// 否则枚举所有数据库逐项求和（估算），并以整个源的总占用作为上限。
			// 总量：estimate().quota（整个源共享的配额）。
			calculateIndexedDBSpace: async function () {
				let total = 0;
				let totalEstimated = true;
				let originUsage;
				if (navigator.storage && navigator.storage.estimate) {
					try {
						const estimation = await navigator.storage.estimate();
						if (Number.isFinite(estimation.quota)) {
							total = estimation.quota;
							totalEstimated = false;
						}
						originUsage = estimation.usage;
						// Chrome 非标准属性 usageDetails 中可能包含按类型拆分的精确用量
						const details = estimation.usageDetails;
						if (details && Number.isFinite(details.indexedDB)) {
							return { used: details.indexedDB, total: total, usedEstimated: false, totalEstimated: totalEstimated };
						}
					} catch (e) {
						console.error('获取存储估算失败:', e);
					}
				}

				let used = 0;
				if (window.indexedDB && window.indexedDB.databases) {
					// 逐项求和（估算）
					try {
						const databases = await indexedDB.databases();
						for (const dbInfo of databases) {
							const stats = await this.getDatabaseStats(dbInfo.name);
							used += stats.size;
						}
					} catch (e) {
						console.error('统计 IndexedDB 大小失败:', e);
					}
				} else if (Number.isFinite(originUsage)) {
					// 更粗的兜底：无法枚举数据库时退化为整个源的总占用
					used = originUsage;
				}
				// 合理性约束：逐项之和不应超过整个源的总占用
				if (Number.isFinite(originUsage) && used > originUsage) {
					used = originUsage;
				}
				if (total === 0) {
					total = 50 * 1024 * 1024; // 默认50MB（估算）
					totalEstimated = true;
				}
				return { used: used, total: total, usedEstimated: true, totalEstimated: totalEstimated };
			},

			// 计算CacheStorage空间
			// 已用大小：优先取 estimate().usageDetails.caches（精确）；
			// 否则遍历所有缓存逐项求和（估算），并以整个源的总占用作为上限。
			// 总量：estimate().quota（整个源共享的配额）。
			calculateCacheStorageSpace: async function () {
				let total = 0;
				let totalEstimated = true;
				let originUsage;
				if (navigator.storage && navigator.storage.estimate) {
					try {
						const estimation = await navigator.storage.estimate();
						if (Number.isFinite(estimation.quota)) {
							total = estimation.quota;
							totalEstimated = false;
						}
						originUsage = estimation.usage;
						// Chrome 非标准属性 usageDetails 中可能包含按类型拆分的精确用量
						const details = estimation.usageDetails;
						if (details && Number.isFinite(details.caches)) {
							return { used: details.caches, total: total, usedEstimated: false, totalEstimated: totalEstimated };
						}
					} catch (e) {
						console.error('获取存储估算失败:', e);
					}
				}

				let used = 0;
				if ('caches' in window) {
					// 逐项求和（估算）
					try {
						const cacheNames = await caches.keys();
						for (const name of cacheNames) {
							const cache = await caches.open(name);
							const requests = await cache.keys();
							used += await this.calculateCacheSize(cache, requests);
						}
					} catch (e) {
						console.error('统计 CacheStorage 大小失败:', e);
					}
				} else if (Number.isFinite(originUsage)) {
					// 更粗的兜底：无 caches API 时退化为整个源的总占用
					used = originUsage;
				}
				// 合理性约束：逐项之和不应超过整个源的总占用
				if (Number.isFinite(originUsage) && used > originUsage) {
					used = originUsage;
				}
				if (total === 0) {
					total = 100 * 1024 * 1024; // 默认100MB（估算）
					totalEstimated = true;
				}
				return { used: used, total: total, usedEstimated: true, totalEstimated: totalEstimated };
			},

			// 辅助-格式化字节大小
			formatBytes: function (bytes, decimals = 2) {
				if (!Number.isFinite(bytes) || bytes <= 0) return '0 Bytes';

				const k = 1024;
				const dm = decimals < 0 ? 0 : decimals;
				const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];

				const i = Math.floor(Math.log(bytes) / Math.log(k));

				// 小于1KB时显示Bytes
				if (i === 0) {
					return bytes + ' ' + sizes[i];
				}

				return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
			},

			// 辅助-格式化日期
			formatDate: function (date) {
				const now = new Date();
				const diff = Math.floor((now - date) / (1000 * 60)); // 分钟差

				if (diff < 1) return '刚刚';
				if (diff < 60) return `${diff}分钟前`;

				const diffHours = Math.floor(diff / 60);
				if (diffHours < 24) return `${diffHours}小时前`;

				const diffDays = Math.floor(diffHours / 24);
				if (diffDays < 7) return `${diffDays}天前`;

				return date.toLocaleDateString('zh-CN', {
					year: 'numeric',
					month: 'short',
					day: 'numeric'
				});
			}
		};

		// 初始化
		document.addEventListener('DOMContentLoaded', function () {
			storageManager.init();
		});
	</script>
</body>
